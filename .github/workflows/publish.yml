name: Release

on:
  push:
    branches:
      - master
      - main

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # Minimum needed for semantic-release to push the tag, create a GitHub
      # Release, and (if NPM_TOKEN is set) publish to npm via OIDC.
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      # actions/setup-node@v4.4.0
      # Round 8: semantic-release 25.x requires Node ^22.14 || >=24.10.
      # Pinning to 22.14 (current LTS line head) keeps the release runtime
      # within the supported engine range.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org/'

      - name: Validate plugin
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json', 'utf8'))"
          node --check bin/gemini-search.mjs
          echo "Validation passed"

      - name: Check NPM_TOKEN availability
        id: npm_token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN is set; semantic-release will publish to npm."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=NPM_TOKEN not set::Skipping semantic-release. Set the NPM_TOKEN repository secret to enable npm publishing."
          fi

      - name: Install pinned semantic-release toolchain
        if: steps.npm_token.outputs.available == 'true'
        # Round 5: package-lock.json is committed and `npm ci` is used so the
        # entire transitive dependency graph is reproducible across releases,
        # not just the direct devDependencies. --ignore-scripts blocks npm
        # lifecycle scripts from any (transitive) dep on the publish path.
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Release
        if: steps.npm_token.outputs.available == 'true'
        run: npx --no-install semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
