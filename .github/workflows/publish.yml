name: Release

on:
  push:
    branches:
      - master
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Validate plugin
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json', 'utf8'))"
          node --check bin/gemini-search.mjs
          echo "Validation passed"

      - name: Check NPM_TOKEN availability
        id: npm_token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN is set; semantic-release will publish to npm."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=NPM_TOKEN not set::Skipping semantic-release. Set the NPM_TOKEN repository secret to enable npm publishing."
          fi

      - name: Install semantic-release
        if: steps.npm_token.outputs.available == 'true'
        run: npm install -g semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/npm @semantic-release/exec @semantic-release/git @semantic-release/github conventional-changelog-conventionalcommits

      - name: Release
        if: steps.npm_token.outputs.available == 'true'
        run: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
