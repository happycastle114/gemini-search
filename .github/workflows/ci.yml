name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Pin to commit SHAs (parity with publish.yml) to defend against
      # upstream tag compromise and guarantee reproducible CI.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Validate plugin manifest
        run: |
          if [ ! -f .claude-plugin/plugin.json ]; then
            echo "Error: .claude-plugin/plugin.json not found"
            exit 1
          fi
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json', 'utf8'))"
          echo "Plugin manifest valid"

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"

      - name: Validate bin script syntax
        run: node --check bin/gemini-search.mjs

      # Round 6: regression tests for citation-stripping contract and
      # terminateChild SIGTERM→SIGKILL fallback. These exercise the exact
      # invariants Oracle has been finding bypasses for, so a regression
      # would block merge instead of leaking into a release.
      - name: Run unit tests
        run: node --test test/wrapper.test.mjs

      - name: Validate hooks.json
        run: |
          if [ -f hooks/hooks.json ]; then
            node -e "JSON.parse(require('fs').readFileSync('hooks/hooks.json', 'utf8'))"
            echo "Hooks config valid"
          fi

      - name: Check skill files exist
        run: |
          for skill in skills/*/SKILL.md; do
            echo "Found skill: $skill"
          done

      - name: Verify plugin structure
        run: |
          echo "=== Plugin Structure ==="
          echo "Manifest: .claude-plugin/plugin.json"
          ls -la .claude-plugin/
          echo ""
          echo "Skills:"
          ls -la skills/*/SKILL.md 2>/dev/null || echo "  (none)"
          echo ""
          echo "Commands:"
          ls -la commands/*.md 2>/dev/null || echo "  (none)"
          echo ""
          echo "Hooks:"
          ls -la hooks/ 2>/dev/null || echo "  (none)"
          echo ""
          echo "Bin:"
          ls -la bin/ 2>/dev/null || echo "  (none)"
          echo ""
          echo "=== Validation Complete ==="
